name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Latest stable Godot (project targets 4.6+; codegen output is
      # version-stable, so goldens generated on dev/stable match). The GUT suite
      # needs no capnp (committed fixtures); the interop job does.
      GODOT_VERSION: 4.7-stable
    steps:
      - uses: actions/checkout@v4

      - name: Install capnp
        run: sudo apt-get update && sudo apt-get install -y capnproto

      - name: Download Godot (headless)
        run: |
          set -eu
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$url" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: GUT suite
        run: CAPNGODO_GODOT="$PWD/godot" sh tools/run_tests.sh

      - name: Interop with reference capnp
        run: CAPNGODO_GODOT="$PWD/godot" CAPNP=capnp sh tools/run_interop.sh
